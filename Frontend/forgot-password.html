<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Khôi phục mật khẩu - Cửa Hàng Nội Thất</title>
    <!-- Tái sử dụng file style.css để giữ giao diện đồng nhất -->
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-container">
        <h2>Quên mật khẩu</h2>
        <p class="subtitle">Nhập email của bạn để nhận hướng dẫn khôi phục mật khẩu</p>
        
        <form id="forgotPasswordForm">
            <div class="input-group">
                <label for="email">Địa chỉ Email</label>
                <input type="email" id="email" placeholder="Nhập email đăng ký tài khoản" required>
            </div>
            
            <button type="submit" class="btn-primary">Gửi mã xác nhận</button>

            <!-- Link quay lại trang Đăng nhập -->
            <div class="auth-links">
                <p><a href="login.html">Quay lại trang Đăng nhập</a></p>
            </div>
        </form>
    </div>

    <script>
        // JS xử lý sự kiện khi ấn gửi
        document.getElementById('forgotPasswordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            
            // Ở đây sau này bạn sẽ gọi Firebase hoặc API gửi email của mình
            alert("Đã gửi mã xác nhận đến: " + email + ". Vui lòng kiểm tra email của bạn!");
            
            // Sau khi gửi xong có thể chuyển hướng hoặc thông báo
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
